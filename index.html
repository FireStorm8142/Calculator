<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calc-styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@200..800&display=swap" rel="stylesheet">
    <title>Calculator</title>
</head>
<body>
    <div class="wrapper">
        <section class="screen"> 0 </section>
        <section class="calc-buttons">
            <div class="button-row">
                <button class="button double"> C </button>
                <button class="button back"> &larr; </button>
                <button class="button op" > &divide; </button>
            </div>
            <div class="button-row">
                <button class="button"> 7 </button>
                <button class="button"> 8 </button>
                <button class="button"> 9 </button>
                <button class="button op"> &times; </button>
            </div>
            <div class="button-row">
                <button class="button"> 4 </button>
                <button class="button"> 5 </button>
                <button class="button"> 6 </button>
                <button class="button op"> &minus; </button>   
            </div class="button-row">
            <div class="button-row">
                <button class="button"> 1 </button>
                <button class="button"> 2 </button>
                <button class="button"> 3 </button>
                <button class="button op"> &plus; </button>
            </div>

            <div class="button-row">
                <button class="button triple"> 0 </button>
                <button class="button"> &equals; </button>
            </div>
        </section>
    </div>
<script src="calculator.js"></script>
</body>
</html>
